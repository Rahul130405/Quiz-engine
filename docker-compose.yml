version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: quizengine

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT:          5000
      MONGODB_URI:   mongodb://mongo:27017/quizengine
      JWT_SECRET:    change_this_in_production_please
      JWT_EXPIRES_IN: 7d
      NODE_ENV:      production
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mongo_data:
